name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Build static site
        run: npm run build:pages
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: /seefood-shop
          NEXT_PUBLIC_STATIC_EXPORT: "true"
          NEXT_PUBLIC_API_BASE_URL: https://willpeng97.github.io/seefood-shop
          NEXT_PUBLIC_APP_URL: https://willpeng97.github.io/seefood-shop

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
